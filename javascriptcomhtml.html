<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
 <div class="container">
  <h1>Boas vindas !</h1>
  <p>Vamos personalizar suas saudações com JavaScript</p>
  <div class="saudacao" id="mensagemSaudacao">Olá , visitante !</div>
  <button onClick="mudarNome()">Personalizar saudação</button>
 </div>

 <script>
    function mudarNome(){
        let nome = "Adilson"
        document.getElementById("mensagemSaudacao").textContent = "Olá , " + nome
    }
    
 </script>
</body>
</html>
